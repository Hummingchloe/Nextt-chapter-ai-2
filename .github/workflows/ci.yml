name: Product Contract CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  product-contract:
    name: Product contract tests + build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit and integration tests
        run: npm test

      - name: Build production app
        run: npm run build
